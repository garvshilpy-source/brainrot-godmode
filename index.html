<!DOCTYPE html>
<html>
<head>
    <title>Brainrot GOD MODE</title>
    <style>
        body {
            background: black;
            color: white;
            text-align: center;
            font-family: Arial;
        }
        input, button {
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
            border: none;
        }
        button {
            background: gold;
            font-weight: bold;
        }
        .card {
            background: #111;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h1>🧠 Brainrot GOD MODE</h1>

<input type="text" id="psLink" placeholder="Paste PS link">
<br>

<button onclick="start()">Start</button>
<button onclick="markSpawn()">OG Spawned</button>

<div id="output"></div>

<script>

let interval;
let currentPS = "";
let data = {};

function start() {

    let ps = document.getElementById("psLink").value;
    if (!ps) return alert("Paste PS link");

    currentPS = ps;

    let saved = localStorage.getItem(ps);
    if (saved) data = JSON.parse(saved);
    else data = { last: null, cycle: 600 };

    run();
}

function markSpawn() {

    let now = Date.now();

    if (data.last) {
        let diff = Math.floor((now - data.last)/1000);
        data.cycle = Math.floor((data.cycle + diff) / 2);
    }

    data.last = now;
    localStorage.setItem(currentPS, JSON.stringify(data));

    alert("OG Recorded ✅");
}

function run() {

    clearInterval(interval);

    interval = setInterval(() => {

        if (!data.last) {
            document.getElementById("output").innerHTML =
                "Press 'OG Spawned' once to calibrate";
            return;
        }

        let now = Date.now();
        let diff = Math.floor((now - data.last)/1000);

        let cycle = data.cycle;
        let passed = diff % cycle;
        let remaining = cycle - passed;

        let phase = getPhase(passed, cycle);
        let range = getRange(remaining);

        document.getElementById("output").innerHTML = `
            <div class="card">🟡 Phase: ${phase}</div>
            <div class="card">⏳ Next OG In: ${format(remaining)}</div>
            <div class="card">🎯 Range: ${range}</div>
        `;

    }, 1000);
}

function getPhase(passed, cycle) {
    let p = passed / cycle;
    if (p < 0.3) return "EARLY";
    if (p < 0.7) return "MID";
    return "LATE (SOON)";
}

function getRange(rem) {
    let now = new Date();
    let start = new Date(now.getTime() + (rem-10)*1000);
    let end = new Date(now.getTime() + rem*1000);
    return formatClock(start) + " - " + formatClock(end);
}

function format(sec) {
    let m = Math.floor(sec/60);
    let s = sec % 60;
    return m + ":" + (s<10?"0":"") + s;
}

function formatClock(d) {
    return d.getHours() + ":" +
           (d.getMinutes()<10?'0':'') + d.getMinutes() + ":" +
           (d.getSeconds()<10?'0':'') + d.getSeconds();
}

</script>

</body>
</html>

<button onclick="markSpawn()">OG Spawned</button>
